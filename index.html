<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thomas Sarina - NAVA GROUP EU</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #d8d4ce;
            font-family: 'Nunito', sans-serif;
        }

        .card {
            width: 360px;
            background: #f0ece4;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.08);
            position: relative;
        }

        /* HERO */
        .hero {
            position: relative;
            height: 380px;
            overflow: hidden;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            filter: grayscale(18%) contrast(1.02);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(240,236,228,0.0) 0%,
                rgba(240,236,228,0.0) 40%,
                rgba(240,236,228,0.6) 72%,
                rgba(240,236,228,1.0) 100%
            );
        }

        /* Lotus watermark top-right */
        .lotus-mark {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 70px;
            height: 70px;
            opacity: 0.12;
            z-index: 2;
        }

        /* CN Logo badge top-left */
        .logo-badge {
            position: absolute;
            top: 18px;
            left: 20px;
            z-index: 5;
        }

        .cn-circle {
            width: 44px;
            height: 44px;
            background: #1a1a18;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-text {
            position: absolute;
            bottom: 18px;
            left: 24px;
            right: 24px;
            z-index: 10;
        }

        .hero-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 500;
            color: #1a1a18;
            line-height: 1.05;
            letter-spacing: 0.5px;
        }

        .hero-title {
            font-size: 9px;
            font-weight: 600;
            color: #8a7a6a;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .hero-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .brand-line {
            width: 20px;
            height: 1px;
            background: #1a1a18;
            opacity: 0.4;
        }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            font-weight: 400;
            color: #1a1a18;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .hero-locations {
            display: flex;
            align-items: center;
            margin-top: 7px;
        }

        .loc {
            font-size: 9px;
            font-weight: 400;
            color: #9a8a78;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .loc-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #1a1a18;
            opacity: 0.3;
            margin: 0 8px;
        }

        /* Thin divider */
        .sep {
            height: 1px;
            background: rgba(26,26,24,0.1);
            margin: 0 24px;
        }

        /* ACTION ICONS */
        .actions {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 8px;
            padding: 22px 20px 18px;
            background: #f0ece4;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            flex: 1;
        }

        .action-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            border: 1px solid rgba(26,26,24,0.12);
            background: rgba(26,26,24,0.04);
        }

        .action-btn:hover .action-icon {
            transform: translateY(-2px);
            background: rgba(26,26,24,0.08);
        }

        .action-icon svg { width: 20px; height: 20px; }

        .action-icon.whatsapp {
            border-color: rgba(37,211,102,0.25);
            background: rgba(37,211,102,0.06);
        }

        .action-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #9a8878;
            text-transform: uppercase;
        }

        .sep2 {
            height: 1px;
            background: rgba(26,26,24,0.08);
            margin: 0 20px;
        }

        /* Reviews */
        .reviews {
            padding: 16px 20px;
            background: #f0ece4;
            display: flex;
            gap: 10px;
        }

        .review-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 8px;
            border-radius: 10px;
            text-decoration: none;
            border: 1px solid rgba(26,26,24,0.12);
            background: rgba(26,26,24,0.03);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .review-btn:hover {
            border-color: rgba(26,26,24,0.25);
            background: rgba(26,26,24,0.07);
        }

        .review-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

        .review-btn-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .review-sub {
            font-size: 8px;
            font-weight: 500;
            letter-spacing: 1px;
            color: #b0a090;
            text-transform: uppercase;
        }

        .review-name {
            font-size: 11px;
            font-weight: 700;
            color: #2a2420;
        }

        /* Save */
        .save-wrap {
            padding: 0 20px 28px;
            background: #f0ece4;
        }

        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #1a1a18;
            color: #f0ece4;
            font-family: 'Nunito', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26,26,24,0.25);
            background: #2e2e2a;
        }

        .save-btn svg { width: 15px; height: 15px; }

        /* Bottom brand footer */
        .footer {
            padding: 12px 24px 16px;
            background: #1a1a18;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 10px;
            font-weight: 400;
            color: rgba(240,236,228,0.45);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .footer-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(240,236,228,0.25);
        }
    </style>
</head>
